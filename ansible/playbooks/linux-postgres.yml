---
# =============================================================================
# Grafana Alloy — Linux + PostgreSQL Playbook
#
# Deploys Alloy with OS-level metrics, PostgreSQL metrics + logs using the
# pre-assembled configs from examples/linux-postgres/.
#
# Prerequisites:
#   - PostgreSQL running on target hosts with a monitoring user:
#       CREATE USER alloy WITH PASSWORD '<password>';
#       GRANT pg_monitor TO alloy;
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/linux-postgres.yml
# =============================================================================

- name: Deploy Alloy — Linux + PostgreSQL
  hosts: alloy_linux_postgres
  become: true

  vars:
    # Point Alloy at a config directory instead of a single file.
    alloy_env_file_vars:
      CONFIG_FILE: "/etc/alloy/"
      CUSTOM_ARGS: "--stability.level=generally-available"

    # .alloy files to copy into /etc/alloy/ on the target.
    alloy_config_files:
      - "{{ playbook_dir }}/../../examples/linux-postgres/endpoints.alloy"
      - "{{ playbook_dir }}/../../examples/linux-postgres/labels.alloy"
      - "{{ playbook_dir }}/../../examples/linux-postgres/alloy-health.alloy"
      - "{{ playbook_dir }}/../../examples/linux-postgres/os.alloy"
      - "{{ playbook_dir }}/../../examples/linux-postgres/postgres.alloy"

    # The alloy user needs journal access and log file read access.
    alloy_user_groups:
      - "systemd-journal"
      - "adm"

    # Environment variable fragments deployed to /etc/alloy/env.d/.
    alloy_env_files:
      - name: "00-endpoints"
        vars:
          PROMETHEUS_REMOTE_WRITE_URL: "{{ prometheus_remote_write_url | default('https://prometheus.example.com/api/v1/write') }}"
          PROMETHEUS_USERNAME: "{{ prometheus_username | default('') }}"
          PROMETHEUS_PASSWORD: "{{ prometheus_password | default('') }}"
          LOKI_WRITE_URL: "{{ loki_write_url | default('https://loki.example.com/loki/api/v1/push') }}"
          LOKI_USERNAME: "{{ loki_username | default('') }}"
          LOKI_PASSWORD: "{{ loki_password | default('') }}"
      - name: "01-labels"
        vars:
          ENVIRONMENT: "{{ environment_label | default('dev') }}"
          TEAM: "{{ team_label | default('') }}"
          REGION: "{{ region_label | default('') }}"
          SYSTEM: "{{ system_label | default('') }}"
          SERVER_CLASS: "{{ server_class_label | default('') }}"
          ZONE: "{{ zone_label | default('') }}"
      - name: "20-postgres"
        vars:
          POSTGRES_DSN: "{{ postgres_dsn | default('postgresql://alloy:password@localhost:5432/postgres?sslmode=disable') }}"

  roles:
    - role: ../roles/alloy
