---
# =============================================================================
# Grafana Alloy — Linux Server + OpenTelemetry Playbook
#
# Deploys Alloy with OS-level metrics (node_exporter), logs (journal + files),
# and an OpenTelemetry collector (OTLP gRPC + HTTP) using the pre-assembled
# configs from examples/linux-server-otel/.
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/linux-server-otel.yml
# =============================================================================

- name: Deploy Alloy — Linux Server + OpenTelemetry
  hosts: alloy_linux
  become: true

  vars:
    # Point Alloy at a config directory instead of a single file.
    alloy_env_file_vars:
      CONFIG_FILE: "/etc/alloy/"
      CUSTOM_ARGS: "--stability.level=generally-available"

    # .alloy files to copy into /etc/alloy/ on the target.
    alloy_config_files:
      - "{{ playbook_dir }}/../../examples/linux-server-otel/endpoints.alloy"
      - "{{ playbook_dir }}/../../examples/linux-server-otel/labels.alloy"
      - "{{ playbook_dir }}/../../examples/linux-server-otel/alloy-health.alloy"
      - "{{ playbook_dir }}/../../examples/linux-server-otel/otel-collector.alloy"
      - "{{ playbook_dir }}/../../examples/linux-server-otel/os.alloy"

    # The alloy user needs journal access and log file read access.
    alloy_user_groups:
      - "systemd-journal"
      - "adm"

    # Environment variable fragments deployed to /etc/alloy/env.d/.
    alloy_env_files:
      - name: "00-endpoints"
        vars:
          PROMETHEUS_REMOTE_WRITE_URL: "{{ prometheus_remote_write_url | default('https://prometheus.example.com/api/v1/write') }}"
          PROMETHEUS_USERNAME: "{{ prometheus_username | default('') }}"
          PROMETHEUS_PASSWORD: "{{ prometheus_password | default('') }}"
          LOKI_WRITE_URL: "{{ loki_write_url | default('https://loki.example.com/loki/api/v1/push') }}"
          LOKI_USERNAME: "{{ loki_username | default('') }}"
          LOKI_PASSWORD: "{{ loki_password | default('') }}"
      - name: "01-labels"
        vars:
          ENVIRONMENT: "{{ environment_label | default('dev') }}"
          TEAM: "{{ team_label | default('') }}"
          REGION: "{{ region_label | default('') }}"
          SYSTEM: "{{ system_label | default('') }}"
          SERVER_CLASS: "{{ server_class_label | default('') }}"
          ZONE: "{{ zone_label | default('') }}"
      - name: "10-otel"
        vars:
          OTLP_ENDPOINT: "{{ otlp_endpoint | default('https://otlp-gateway.example.com/otlp') }}"
          OTLP_USERNAME: "{{ otlp_username | default('') }}"
          OTLP_PASSWORD: "{{ otlp_password | default('') }}"

  roles:
    - role: ../roles/alloy
