---
# ===========================================================================
# Windows deployment for Grafana Alloy
#
# Installs via silent .exe installer, configures via registry, and deploys
# .alloy config files to the install directory.
#
# References:
#   https://grafana.com/docs/alloy/latest/set-up/install/windows/
#   https://grafana.com/docs/alloy/latest/configure/windows/
# ===========================================================================

# ---------------------------------------------------------------------------
# Resolve version
# ---------------------------------------------------------------------------
- name: Obtain the latest version from the GitHub repo
  when: alloy_version == "latest"
  block:
    - name: Scrape GitHub API endpoint to obtain latest Alloy version
      ansible.builtin.uri:
        url: "{{ alloy_github_api_url }}"
        method: GET
        body_format: json
      become: false
      delegate_to: localhost
      run_once: true
      check_mode: false
      register: __github_latest_version

    - name: Latest available Alloy version
      ansible.builtin.set_fact:
        alloy_version: "{{ __github_latest_version.json.tag_name | regex_replace('^v?(\\d+\\.\\d+\\.\\d+)$', '\\1') }}"

# ---------------------------------------------------------------------------
# Check currently deployed version
# ---------------------------------------------------------------------------
- name: Check if Alloy is installed
  ansible.windows.win_stat:
    path: "{{ __alloy_win_install_dir }}\\alloy-windows-amd64.exe"
  register: __alloy_installed

- name: Get current Alloy version
  ansible.windows.win_command:
    cmd: '"{{ __alloy_win_install_dir }}\alloy-windows-amd64.exe" --version'
  changed_when: false
  register: __current_deployed_version
  when: __alloy_installed.stat.exists | bool

# ---------------------------------------------------------------------------
# Download and install
# ---------------------------------------------------------------------------
- name: Download Alloy installer
  ansible.windows.win_get_url:
    url: "{{ __alloy_win_installer_url }}"
    dest: "{{ __alloy_win_installer_path }}"
  when: __current_deployed_version.stdout is not defined or alloy_version not in (__current_deployed_version.stdout | default(''))

- name: Install Alloy silently
  ansible.windows.win_command:
    cmd: '"{{ __alloy_win_installer_path }}" /S /STABILITY=generally-available'
  when: __current_deployed_version.stdout is not defined or alloy_version not in (__current_deployed_version.stdout | default(''))
  notify: restart alloy windows

- name: Remove installer
  ansible.windows.win_file:
    path: "{{ __alloy_win_installer_path }}"
    state: absent

# ---------------------------------------------------------------------------
# Config deployment: multi-file
# ---------------------------------------------------------------------------
- name: Deploy multi-config directory (Windows)
  when: alloy_config_files | length > 0
  block:
    - name: Remove default config.alloy
      ansible.windows.win_file:
        path: "{{ __alloy_win_config_dir }}\\config.alloy"
        state: absent

    - name: Copy .alloy config files
      ansible.windows.win_copy:
        src: "{{ item }}"
        dest: "{{ __alloy_win_config_dir }}\\{{ item | basename }}"
      loop: "{{ alloy_config_files }}"
      notify: restart alloy windows

# ---------------------------------------------------------------------------
# Configure registry: Arguments (point to config directory)
# ---------------------------------------------------------------------------
- name: Set Alloy registry Arguments (config directory mode)
  ansible.windows.win_regedit:
    path: "{{ __alloy_win_registry_key }}"
    name: Arguments
    data:
      - "run"
      - "{{ __alloy_win_config_dir }}\\"
      - "--storage.path={{ __alloy_win_data_dir }}"
      - "--stability.level=generally-available"
    type: multistring
  when: alloy_config_files | length > 0
  notify: restart alloy windows

# ---------------------------------------------------------------------------
# Configure registry: Environment variables
# ---------------------------------------------------------------------------
- name: Build environment variable list
  ansible.builtin.set_fact:
    __alloy_win_env_list: >-
      {{
        (alloy_env_file_vars | dict2items | map(attribute='key') | zip(alloy_env_file_vars | dict2items | map(attribute='value')) | map('join', '=') | list)
        + (alloy_env_files | map(attribute='vars', default={}) | map('dict2items') | flatten | map(attribute='key') | zip(alloy_env_files | map(attribute='vars', default={}) | map('dict2items') | flatten | map(attribute='value')) | map('join', '=') | list)
        + (alloy_extra_env_vars | dict2items | map(attribute='key') | zip(alloy_extra_env_vars | dict2items | map(attribute='value')) | map('join', '=') | list)
      }}

- name: Set Alloy registry Environment variables
  ansible.windows.win_regedit:
    path: "{{ __alloy_win_registry_key }}"
    name: Environment
    data: "{{ __alloy_win_env_list }}"
    type: multistring
  when: __alloy_win_env_list | length > 0
  no_log: true
  notify: restart alloy windows

# ---------------------------------------------------------------------------
# Set machine-level environment variables (for sys.env())
# ---------------------------------------------------------------------------
- name: Build merged env vars dict for machine environment
  ansible.builtin.set_fact:
    __alloy_win_merged_env: >-
      {{
        alloy_extra_env_vars
        | combine(alloy_env_files | map(attribute='vars', default={}) | list | combine)
      }}

- name: Set machine environment variables for sys.env()
  ansible.windows.win_environment:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    level: machine
    state: present
  loop: "{{ __alloy_win_merged_env | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: __alloy_win_merged_env | length > 0
  no_log: true
  notify: restart alloy windows

# ---------------------------------------------------------------------------
# Security groups (per Grafana docs)
# ---------------------------------------------------------------------------
- name: Add Alloy service account to security groups
  ansible.windows.win_group_membership:
    name: "{{ item }}"
    members:
      - "NT AUTHORITY\\SYSTEM"
    state: present
  loop: "{{ alloy_win_security_groups }}"
  when: alloy_win_security_groups | length > 0

# ---------------------------------------------------------------------------
# Firewall rule (optional)
# ---------------------------------------------------------------------------
- name: Allow Alloy HTTP port through Windows Firewall
  community.windows.win_firewall_rule:
    name: "Grafana Alloy"
    localport: "{{ __alloy_server_http_listen_port }}"
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: true
  when: alloy_expose_port | bool

# ---------------------------------------------------------------------------
# Start & verify
# ---------------------------------------------------------------------------
- name: Flush handlers after deployment
  ansible.builtin.meta: flush_handlers

- name: Ensure that Alloy service is started
  ansible.windows.win_service:
    name: Alloy
    state: started
    start_mode: auto
  when: not ansible_check_mode

- name: Verify that Alloy URL is responding
  ansible.windows.win_uri:
    url: "http://{{ __alloy_server_http_listen_address }}:{{ __alloy_server_http_listen_port }}/-/ready"
    method: GET
  register: __alloy_verify_url_status_code
  retries: 5
  delay: 8
  until: __alloy_verify_url_status_code.status_code == 200
  when: not ansible_check_mode
